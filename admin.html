<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Jadwal Sekolah</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    margin:0;
    font-family:"Segoe UI",Arial,sans-serif;
    background:linear-gradient(
        135deg,
        #eef7ff,
        #ffffff
    );
    color:#263238;
}


.container{
    max-width:450px;
    margin:auto;
    padding:20px;
}


.header{

    background:white;
    padding:25px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    border-top:6px solid #0d6efd;

}


.header h1{

    color:#0d47a1;
    margin:0;

}



.form{

    background:white;
    margin-top:20px;
    padding:20px;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);

}


label{

    display:block;
    margin-top:15px;
    font-weight:bold;
    color:#1565c0;

}


input,select{

    width:100%;
    padding:13px;
    margin-top:8px;
    border-radius:15px;
    border:1px solid #ddd;
    font-size:15px;

}



button{

    width:100%;
    margin-top:20px;
    padding:15px;
    border:none;
    border-radius:20px;
    background:#1565c0;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;

}


button:hover{

    background:#0d47a1;

}


.status{

    margin-top:15px;
    text-align:center;
    font-weight:bold;

}


</style>


</head>


<body>


<div class="container">


<div class="header">

<h1>
⚙️ Admin Jadwal
</h1>

<p>
Pengaturan Jadwal Pembelajaran
</p>

</div>



<div class="form">


<label>
Hari
</label>

<select id="hari">

<option>Senin</option>
<option>Selasa</option>
<option>Rabu</option>
<option>Kamis</option>
<option>Jumat</option>
<option>Sabtu</option>
<option>Minggu</option>

</select>



<label>
Mata Pelajaran
</label>

<input 
id="mata_pelajaran"
type="text"
placeholder="Masukkan mata pelajaran">



<label>
Guru
</label>

<input
id="guru"
type="text"
placeholder="Masukkan nama guru">



<button onclick="simpanJadwal()">
💾 Simpan Jadwal
</button>


<div class="status" id="status"></div>


</div>


</div>



<script>


// Koneksi Supabase

const SUPABASE_URL = "https://yynjkjyzijtukyhavmqn.supabase.co";

const SUPABASE_KEY = "sb_publishable_kj0vTSzCm4T1-uvrOrB1GQ_x05jyqxa";


const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);



// Simpan data

async function simpanJadwal(){


    const hari =
    document.getElementById("hari").value;


    const mataPelajaran =
    document.getElementById("mata_pelajaran").value;


    const guru =
    document.getElementById("guru").value;



    if(!mataPelajaran){

        tampilStatus("⚠️ Mata pelajaran belum diisi");

        return;

    }



    const { data, error } =
    await supabaseClient
    .from("jadwal")
    .insert([

        {
            hari:hari,
            mata_pelajaran:mataPelajaran,
            guru:guru
        }

    ]);



    if(error){

        tampilStatus(
            "❌ Gagal menyimpan: "
            + error.message
        );


    }else{


        tampilStatus(
            "✅ Jadwal berhasil disimpan"
        );


        document.getElementById("mata_pelajaran").value="";
        document.getElementById("guru").value="";


    }


}



function tampilStatus(pesan){

    document.getElementById("status").innerHTML = pesan;

}


</script>


</body>
</html>
